<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Novelist Pro | Safety-Retry Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --cn: #e17055; --en: #0984e3; --border: #e2e8f0; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 15px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 3px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 9px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .tab.active[data-lang="zh"] { background: var(--cn); color: white; }
        .tab.active[data-lang="en"] { background: var(--en); color: white; }

        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: var(--cn); transition: width 0.3s ease; }
        .status-text { font-size: 12px; font-weight: 600; color: #64748b; margin-top: 5px; display: block; }

        .playlist-bar { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-left: 5px solid #636e72; }
        .select-input { width: calc(100% - 60px); padding: 10px; border-radius: 10px; border: 1px solid #cbd5e0; font-size: 14px; }
        
        .upload-area { border: 2px dashed #cbd5e0; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; background: #fff; margin-bottom: 15px; }
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .preview-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }

        textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 15px; margin-bottom: 10px; min-height: 120px; line-height: 1.5; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn-ai { background: #2d3436; color: white; }
        .btn-polish { background: #6c5ce7; color: white; }
        .btn-copy { background: #636e72; color: white; }
        .btn-save { background: #00b894; color: white; }
        .btn-del { color: #e74c3c; background: none; border: none; font-size: 12px; cursor: pointer; }

        .folder { background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
        .folder-h { padding: 15px; background: #f8fafc; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; }
        .folder-c { display: none; padding: 10px; border-top: 1px solid #f1f5f9; }
        .folder-c.open { display: block; }
        .history-item { padding: 12px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <div class="tabs">
            <button class="tab active" data-lang="zh">🇨🇳 จีน > ไทย</button>
            <button class="tab" data-lang="en">🇺🇸 อังกฤษ > ไทย</button>
        </div>

        <div id="pBar" class="playlist-bar">
            <div style="font-size: 11px; font-weight: 600; margin-bottom: 5px; color: #64748b;">📖 MEMORY CHANNEL (PLAYLIST)</div>
            <select id="pSelect" class="select-input"></select>
            <button onclick="addNewPlaylist()" class="btn" style="width:45px; display:inline-flex; padding:8px; margin:0;">➕</button>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 24px;">📸</div>
            <div style="font-weight: 600; color: #4a5568;">สแกนรูปภาพนิยาย</div>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
            <div id="previewGrid" class="preview-grid"></div>
        </div>

        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <span id="status" class="status-text">พร้อมแปลและแบ่งท่อนอัตโนมัติ</span>

        <textarea id="srcText" placeholder="วางข้อความที่นี่ หรือสแกนภาพ..."></textarea>
        
        <div style="display: flex; gap: 10px;">
            <button id="aiBtn" class="btn btn-ai" style="flex: 2;">✨ แบ่งแปล & เกลาอัตโนมัติ</button>
            <button id="polishBtn" class="btn btn-polish" style="flex: 1;">✍️ เกลาสำนวน</button>
        </div>
        
        <div id="resContainer" style="display:none;">
            <div id="aiRes" style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:10px; white-space:pre-wrap; font-size:15px; line-height:1.7; border-left: 4px solid #6c5ce7;"></div>
            <button id="copyBtn" class="btn btn-copy">📋 คัดลอกคำแปลทั้งหมด</button>
            <button id="saveBtn" class="btn btn-save">💾 บันทึกความจำ</button>
        </div>
    </div>

    <div id="historyContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyDjxB3WDZ7Q4EpZXskv93NP1GBAy3SCzLU",
        authDomain: "read-words-and-translate.firebaseapp.com",
        databaseURL: "https://read-words-and-translate-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "read-words-and-translate"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    let currentLang = 'zh';
    
    // คีย์ใหม่ที่คุณให้มาครับ
    const API_KEY = "AIzaSyCgN2Sd2f73OhZDMwkkoAJF9g0d1iVIKNc";

    const updateProgress = (percent, text) => {
        const container = document.getElementById('progressContainer');
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        container.style.display = 'block';
        bar.style.width = percent + '%';
        status.innerText = text;
        if (percent >= 100) setTimeout(() => { container.style.display = 'none'; }, 2000);
    };

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => t.onclick = () => {
        tabs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        currentLang = t.dataset.lang;
    });

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        const grid = document.getElementById('previewGrid'); grid.innerHTML = "";
        const worker = await Tesseract.createWorker(currentLang === 'zh' ? 'chi_sim' : 'eng');
        let fullText = "";
        for (let i = 0; i < files.length; i++) {
            updateProgress(Math.round((i/files.length)*100), `🔍 สแกนหน้า ${i+1}...`);
            const img = document.createElement('img'); img.src = URL.createObjectURL(files[i]);
            grid.appendChild(img);
            const ret = await worker.recognize(files[i]);
            fullText += ret.data.text.trim() + "\n";
        }
        await worker.terminate();
        document.getElementById('srcText').value = fullText.trim();
        updateProgress(100, "✅ สแกนสำเร็จ");
    };

    onValue(ref(db, 'playlists'), (s) => {
        const select = document.getElementById('pSelect');
        select.innerHTML = '<option value="">-- ไม่ใช้ความจำ --</option>';
        if (s.exists()) Object.keys(s.val()).forEach(k => select.add(new Option(k, k)));
    });

    window.addNewPlaylist = () => {
        const name = prompt("ชื่อเรื่องใหม่:");
        if (name) set(ref(db, `playlists/${name}`), true);
    };

    async function askGemini(promptText) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptText }] }],
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ],
                    generationConfig: {
                        temperature: 0.4,
                        maxOutputTokens: 1000
                    }
                })
            });
            const d = await res.json();
            return d.candidates?.[0]?.content?.parts?.[0]?.text || null;
        } catch (e) { return null; }
    }

    document.getElementById('aiBtn').onclick = async () => {
        const text = document.getElementById('srcText').value;
        const pName = document.getElementById('pSelect').value;
        if (!text) return alert("กรุณาใส่ข้อความ");

        const chunks = text.split('\n').filter(line => line.trim() !== "");
        let combinedTranslation = "";
        
        updateProgress(5, "🚀 กำลังรวบรวมบริบท...");

        let memory = "";
        if (pName) {
            const snap = await get(ref(db, `data_by_playlist/${pName}`));
            if (snap.exists()) {
                const items = Object.values(snap.val()).slice(-3);
                memory = items.map(i => i.result).join("\n");
            }
        }

        for (let i = 0; i < chunks.length; i++) {
            const progress = Math.round(((i + 1) / chunks.length) * 100);
            updateProgress(progress, `✍️ แปลท่อนที่ ${i + 1}/${chunks.length}...`);

            // 1. ลองแปลด้วยคำสั่งแบบนิยาย (Soft Prompt)
            let prompt = `แปลประโยคนี้เป็นไทยด้วยสำนวนนิยาย: "${chunks[i]}"\n${memory ? `(บริบทเดิม: ${memory.substring(0, 100)}...)` : ''}`;
            let result = await askGemini(prompt);
            
            // 2. ถ้าติดฟิลเตอร์ (null) ให้ Retry ด้วยคำสั่งที่สั้นและซอฟต์ที่สุด
            if (!result) {
                console.log("Retry layer activated for chunk " + (i+1));
                const retryPrompt = `Translate this to Thai: "${chunks[i]}"`;
                result = await askGemini(retryPrompt);
            }

            if (result) {
                combinedTranslation += result.trim() + "\n";
            } else {
                combinedTranslation += "⚠️ [ข้าม 1 ประโยค: AI ปฏิเสธเนื้อหา]\n";
            }
        }

        document.getElementById('aiRes').innerText = combinedTranslation.trim();
        document.getElementById('resContainer').style.display = 'block';
        updateProgress(100, "✨ แปลเสร็จสมบูรณ์!");
    };

    document.getElementById('polishBtn').onclick = async () => {
        const text = document.getElementById('srcText').value;
        if (!text) return alert("วางข้อความไทยที่จะเกลาก่อนครับ");
        updateProgress(50, "✨ กำลังเรียบเรียงสำนวนใหม่...");
        const result = await askGemini(`ในฐานะบรรณาธิการนิยาย ช่วยเกลาประโยคภาษาไทยนี้ให้สละสลวย ลื่นไหล และอ่านสนุกยิ่งขึ้น:\n${text}`);
        if (result) {
            document.getElementById('aiRes').innerText = result;
            document.getElementById('resContainer').style.display = 'block';
            updateProgress(100, "✍️ เกลาเสร็จแล้ว");
        }
    };

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(document.getElementById('aiRes').innerText);
        alert("คัดลอกแล้ว");
    };

    document.getElementById('saveBtn').onclick = () => {
        const pName = document.getElementById('pSelect').value || "แปลเล่นๆ";
        push(ref(db, `data_by_playlist/${pName}`), {
            original: document.getElementById('srcText').value,
            result: document.getElementById('aiRes').innerText,
            date: new Date().toLocaleString()
        });
        alert("บันทึกความจำแล้ว");
    };

    onValue(ref(db, 'data_by_playlist'), (s) => {
        const container = document.getElementById('historyContainer');
        container.innerHTML = '<h3 style="font-size: 14px; color: #64748b; margin-top: 20px;">📚 HISTORY LOG</h3>';
        if (!s.exists()) return;
        Object.keys(s.val()).forEach(pName => {
            const folder = document.createElement('div'); folder.className = 'folder';
            folder.innerHTML = `<div class="folder-h" onclick="this.nextElementSibling.classList.toggle('open')">
                <span>${pName === 'แปลเล่นๆ' ? '💬' : '📖'} ${pName}</span><span>▼</span>
            </div>
            <div class="folder-c">
                ${Object.keys(s.val()[pName]).reverse().map(id => `
                    <div class="history-item">
                        <div style="font-size:11px; color:#94a3b8;">${s.val()[pName][id].date}</div>
                        <div style="font-size:14px; margin-top:5px;">${s.val()[pName][id].result}</div>
                        <button class="btn-del" onclick="window.delItem('${pName}','${id}')">🗑️ ลบ</button>
                    </div>`).join('')}
                <button class="btn-del" style="width:100%; padding:10px; background:#fee2e2; margin-top:10px;" onclick="window.delFolder('${pName}')">🔥 ลบทั้งเรื่อง</button>
            </div>`;
            container.appendChild(folder);
        });
    });

    window.delItem = (p, id) => { if(confirm('ลบ?')) remove(ref(db, `data_by_playlist/${p}/${id}`)); };
    window.delFolder = (p) => { if(confirm(`ลบ "${p}"?`)) { remove(ref(db, `data_by_playlist/${p}`)); remove(ref(db, `playlists/${p}`)); }};
</script>
</body>
</html>
