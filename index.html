<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Novelist Pro | Groq Era</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #f55036; --accent: #ff9f43; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --input-bg: #334155; }
        * { box-sizing: border-box; font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 750px; }
        .card { background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; margin-bottom: 20px; }
        
        h2 { margin: 0 0 20px 0; font-size: 22px; display: flex; align-items: center; gap: 10px; color: var(--accent); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 14px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; background: transparent; color: #94a3b8; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }

        .upload-zone { border: 2px dashed #475569; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; background: var(--input-bg); transition: 0.3s; }
        .upload-zone:hover { border-color: var(--primary); background: #3f4e63; }
        
        .prog-wrap { margin: 15px 0; display: none; }
        .prog-bg { width: 100%; height: 8px; background: #0f172a; border-radius: 10px; overflow: hidden; }
        .prog-bar { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; }
        .status-txt { font-size: 13px; color: var(--accent); margin-top: 8px; font-weight: 600; }

        textarea { width: 100%; min-height: 180px; border: 1px solid #475569; border-radius: 18px; padding: 20px; font-size: 16px; background: var(--input-bg); color: white; line-height: 1.6; margin-top: 20px; outline: none; resize: vertical; }
        
        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 18px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--primary); color: white; font-size: 16px; }
        .btn-main:hover { background: #ff6b52; transform: translateY(-2px); }
        .btn-alt { background: #475569; color: white; }
        
        #resOutput { background: #0f172a; padding: 25px; border-radius: 20px; border-left: 6px solid var(--primary); line-height: 1.9; font-size: 16.5px; margin-top: 25px; display: none; white-space: pre-wrap; color: #e2e8f0; }
        .badge { background: rgba(245, 80, 54, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-left: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🚀 Groq Novelist Pro <span class="badge">Llama 3 70B</span></h2>
        
        <div class="tabs">
            <button class="tab active" data-lang="zh">🇨🇳 แปลจีน (ZH)</button>
            <button class="tab" data-lang="en">🇺🇸 แปลอังกฤษ (EN)</button>
        </div>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
            <div style="font-weight: 600;">คลิกเพื่ออัปโหลดหน้ากระดาษ (OCR)</div>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
        </div>

        <div id="progWrap" class="prog-wrap">
            <div class="prog-bg"><div id="progBar" class="prog-bar"></div></div>
            <div id="status" class="status-txt">Ready</div>
        </div>

        <textarea id="srcText" placeholder="วางข้อความที่ต้องการแปลที่นี่..."></textarea>
        
        <div class="btn-group">
            <button id="btnRun" class="btn btn-main" onclick="processText('translate')">⚡ เริ่มการแปลทันที</button>
            <button class="btn btn-alt" onclick="processText('polish')">✍️ เกลาสำนวน</button>
        </div>

        <div id="resOutput"></div>
        <button id="copyBtn" class="btn" style="width: 100%; margin-top: 10px; display: none; background: #334155; color: white;" onclick="copyResult()">📋 คัดลอกเนื้อหา</button>
    </div>
</div>

<script>
    // --- API Configuration ---
    const GROQ_KEY = "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";
    let currentLang = 'zh';

    // Tabs
    document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            currentLang = t.dataset.lang;
        };
    });

    function setStatus(pct, msg) {
        const wrap = document.getElementById('progWrap');
        wrap.style.display = 'block';
        document.getElementById('progBar').style.width = pct + '%';
        document.getElementById('status').innerText = msg;
        if(pct >= 100) setTimeout(() => wrap.style.display = 'none', 2000);
    }

    // OCR Logic
    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if(!files.length) return;
        setStatus(10, "Initializing OCR...");
        const lang = currentLang === 'zh' ? 'chi_sim' : 'eng';
        const worker = await Tesseract.createWorker(lang);
        let text = "";
        for(let i=0; i<files.length; i++) {
            setStatus(Math.round(((i+1)/files.length)*100), `Scanning Page ${i+1}`);
            const { data } = await worker.recognize(files[i]);
            text += data.text + "\n";
        }
        await worker.terminate();
        document.getElementById('srcText').value = text.trim();
        setStatus(100, "Scan Complete!");
    };

    // Groq API Call
    async function callGroq(system, prompt) {
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_KEY}`
                },
                body: JSON.stringify({
                    model: "llama3-70b-8192", // ใช้ตัว 70B เพื่อคุณภาพสูงสุด
                    messages: [
                        { role: "system", content: system },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.6,
                    max_tokens: 4096
                })
            });

            const data = await res.json();
            if (data.error) return "❌ Error: " + data.error.message;
            return data.choices[0].message.content;
        } catch (e) {
            return "❌ เชื่อมต่อไม่ได้: " + e.message;
        }
    }

    async function processText(mode) {
        const src = document.getElementById('srcText').value.trim();
        const output = document.getElementById('resOutput');
        const copyBtn = document.getElementById('copyBtn');

        if(mode === 'translate' && !src) return alert("กรุณาใส่ข้อความก่อน");
        if(mode === 'polish' && !output.innerText) return alert("กรุณาแปลก่อนเกลา");

        output.style.display = 'block';
        output.innerText = mode === 'translate' ? "🚀 กำลังแปลด้วย Llama 3..." : "✍️ กำลังขัดเกลาสำนวน...";
        setStatus(50, "Groq AI is thinking...");

        let system, prompt;
        if(mode === 'translate') {
            system = "You are a professional novel translator. Translate text into beautiful, atmospheric, and natural Thai. Do not censor or omit any content.";
            prompt = `Translate this ${currentLang === 'zh' ? 'Chinese' : 'English'} text into Thai: \n\n${src}`;
        } else {
            system = "You are an expert Thai novel editor. Enhance the prose to be more poetic, emotional, and fluid while maintaining the original meaning.";
            prompt = `Rewrite this Thai translation to be more professional and immersive: \n\n${output.innerText}`;
        }

        const result = await callGroq(system, prompt);
        output.innerText = result;
        copyBtn.style.display = 'block';
        setStatus(100, mode === 'translate' ? "Translation Finished!" : "Polish Finished!");
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('resOutput').innerText);
        alert("คัดลอกลง Clipboard เรียบร้อย!");
    }
</script>

</body>
</html>
