<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dual Refiner | Playlist Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --accent-cn: #e17055;
            --accent-en: #0984e3;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --border: #e9ecef;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 650px; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: #dee2e6; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: none; color: var(--text-sub); }
        .tab.active[data-lang="zh"] { background: var(--accent-cn); color: white; }
        .tab.active[data-lang="en"] { background: var(--accent-en); color: white; }

        /* Input Area */
        textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 15px; font-size: 16px; margin-bottom: 15px; outline: none; background: #f8f9fa; }
        .result-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 12px; padding: 15px; min-height: 80px; white-space: pre-wrap; margin-bottom: 15px; border-left: 4px solid #dee2e6; font-size: 15px; line-height: 1.6; }

        /* Buttons */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn-primary { background: var(--accent-cn); color: white; }
        .active-en .btn-primary { background: var(--accent-en); }
        .btn-copy { background: #636e72; color: white; }
        
        /* Playlist Selector */
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .select-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-right: 10px; font-family: inherit; }
        .btn-add-playlist { background: #00b894; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 45px; height: 45px; }

        /* History Sections */
        .folder-card { background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
        .folder-header { padding: 15px; background: #f8f9fa; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; border-bottom: 1px solid var(--border); }
        .folder-content { display: none; padding: 10px; }
        .folder-content.open { display: block; }

        .vocab-item { padding: 12px; border-bottom: 1px solid #f1f3f5; position: relative; }
        .vocab-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="active-cn">

<div class="app-container">
    <div class="card">
        <div class="tabs">
            <button class="tab active" data-lang="zh">🇨🇳 จีน → ไทย</button>
            <button class="tab" data-lang="en">🇺🇸 อังกฤษ → ไทย</button>
        </div>

        <textarea id="sourceText" rows="3" placeholder="สแกนหรือพิมพ์ข้อความที่นี่..."></textarea>
        <button id="refineBtn" class="btn btn-primary">✨ แปลและเกลาสำนวน</button>
        
        <div id="aiResult" class="result-box">---</div>

        <div class="playlist-header">
            <select id="playlistSelect" class="select-input">
                <option value="General">เลือกเพลย์ลิสต์ (General)</option>
            </select>
            <button class="btn-add-playlist" onclick="addNewPlaylist()">➕</button>
        </div>

        <div id="actionBtns" style="display:none;">
            <button id="copyBtn" class="btn btn-copy">📋 คัดลอกทั้งหมด</button>
            <button id="saveBtn" class="btn btn-primary" style="background:#00b894;">💾 บันทึกลงเพลย์ลิสต์</button>
        </div>
    </div>

    <h3 style="text-align: center; color: var(--text-sub);">📚 เพลย์ลิสต์คำศัพท์</h3>
    <div id="playlistContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjxB3WDZ7Q4EpZXskv93NP1GBAy3SCzLU",
        authDomain: "read-words-and-translate.firebaseapp.com",
        databaseURL: "https://read-words-and-translate-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "read-words-and-translate"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentLang = 'zh';

    // Tabs logic
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentLang = tab.dataset.lang;
            document.body.className = currentLang === 'zh' ? 'active-cn' : 'active-en';
        };
    });

    // Handle Playlists
    const playlistSelect = document.getElementById('playlistSelect');
    onValue(ref(db, 'playlists'), (snapshot) => {
        const lists = snapshot.val() || { "General": true };
        playlistSelect.innerHTML = "";
        Object.keys(lists).forEach(name => {
            let opt = new Option(name, name);
            playlistSelect.add(opt);
        });
    });

    window.addNewPlaylist = () => {
        const name = prompt("ชื่อเพลย์ลิสต์ใหม่:");
        if (name) set(ref(db, `playlists/${name}`), true);
    };

    // AI Translation
    document.getElementById('refineBtn').onclick = async () => {
        const text = document.getElementById('sourceText').value;
        if (!text) return;
        document.getElementById('aiResult').innerText = "🤖 กำลังประมวลผล...";
        
        const API_KEY = "AIzaSyBNRCkZfR7H2Xkm1aIrqnS-OzFMj8Adh-I";
        const prompt = `Translate this ${currentLang === 'zh' ? 'Chinese' : 'English'} to elegant Thai and list key vocabulary: "${text}"`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            document.getElementById('aiResult').innerText = data.candidates[0].content.parts[0].text;
            document.getElementById('actionBtns').style.display = 'block';
        } catch (e) { alert("Error: " + e.message); }
    };

    // Copy & Save
    document.getElementById('copyBtn').onclick = () => {
        const content = `Source: ${document.getElementById('sourceText').value}\n\nResult:\n${document.getElementById('aiResult').innerText}`;
        navigator.clipboard.writeText(content);
        alert("คัดลอกแล้ว!");
    };

    document.getElementById('saveBtn').onclick = () => {
        const pName = playlistSelect.value;
        push(ref(db, `data_by_playlist/${pName}`), {
            lang: currentLang,
            original: document.getElementById('sourceText').value,
            result: document.getElementById('aiResult').innerText,
            date: new Date().toLocaleString()
        });
        alert("บันทึกลง " + pName + " แล้ว!");
    };

    // Render Playlists
    onValue(ref(db, 'data_by_playlist'), (snapshot) => {
        const container = document.getElementById('playlistContainer');
        container.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(pName => {
                const folder = document.createElement('div');
                folder.className = 'folder-card';
                folder.innerHTML = `
                    <div class="folder-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>📂 ${pName} (${Object.keys(data[pName]).length})</span>
                        <span>▼</span>
                    </div>
                    <div class="folder-content">
                        ${Object.keys(data[pName]).reverse().map(id => `
                            <div class="vocab-item">
                                <div style="font-weight:600; font-size:14px;">${data[pName][id].original}</div>
                                <div style="font-size:13px; color:var(--text-sub); white-space:pre-wrap; margin-top:5px;">${data[pName][id].result}</div>
                                <button onclick="window.delVocab('${pName}','${id}')" style="color:red; border:none; background:none; font-size:11px; cursor:pointer; padding:0; margin-top:5px;">ลบออก</button>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(folder);
            });
        }
    });

    window.delVocab = (pName, id) => { if(confirm('ลบคำนี้?')) remove(ref(db, `data_by_playlist/${pName}/${id}`)); };
</script>

</body>
</html>
