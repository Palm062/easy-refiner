<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dual Refiner | OCR & Playlist</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --accent-cn: #e17055;
            --accent-en: #0984e3;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --border: #e9ecef;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 650px; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: #dee2e6; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: none; color: var(--text-sub); }
        .tab.active[data-lang="zh"] { background: var(--accent-cn); color: white; }
        .tab.active[data-lang="en"] { background: var(--accent-en); color: white; }

        /* Upload Area */
        .upload-section { border: 2px dashed #cbd5e0; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; background: #fdfdfd; margin-bottom: 15px; }
        #imagePreview { width: 100%; border-radius: 12px; margin-top: 15px; display: none; }
        .status-chip { display: inline-block; padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 600; margin-bottom: 10px; background: #eee; }

        textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 15px; font-size: 16px; margin-bottom: 15px; outline: none; background: #f8f9fa; }
        .result-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 12px; padding: 15px; min-height: 80px; white-space: pre-wrap; margin-bottom: 15px; border-left: 4px solid #dee2e6; font-size: 15px; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn-primary { background: var(--accent-cn); color: white; }
        .active-en .btn-primary { background: var(--accent-en); }
        .btn-copy { background: #636e72; color: white; }
        
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .select-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-right: 10px; font-family: inherit; }
        .btn-add-playlist { background: #00b894; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }

        .folder-card { background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
        .folder-header { padding: 15px; background: #f8f9fa; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; }
        .folder-content { display: none; padding: 10px; }
        .folder-content.open { display: block; }
        .vocab-item { padding: 12px; border-bottom: 1px solid #f1f3f5; }
    </style>
</head>
<body class="active-cn">

<div class="app-container">
    <div class="card">
        <div class="tabs">
            <button class="tab active" data-lang="zh">🇨🇳 จีน</button>
            <button class="tab" data-lang="en">🇺🇸 อังกฤษ</button>
        </div>

        <div class="upload-section" onclick="document.getElementById('fileInput').click()">
            <span style="font-size: 24px;">📸</span><br>
            <span id="uploadText">กดเพื่อเลือกรูปภาพ</span>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            <img id="imagePreview">
        </div>
        <div id="status" class="status-chip">พร้อมใช้งาน</div>

        <textarea id="sourceText" rows="3" placeholder="ข้อความจากการสแกนจะขึ้นที่นี่..."></textarea>
        <button id="refineBtn" class="btn btn-primary">✨ แปลและเกลาสำนวน</button>
        
        <div id="aiResult" class="result-box">---</div>

        <div class="playlist-header">
            <select id="playlistSelect" class="select-input"></select>
            <button class="btn-add-playlist" onclick="addNewPlaylist()">➕ ใหม่</button>
        </div>

        <div id="actionBtns" style="display:none;">
            <button id="copyBtn" class="btn btn-copy">📋 คัดลอกทั้งหมด</button>
            <button id="saveBtn" class="btn btn-primary" style="background:#00b894;">💾 บันทึกลงเพลย์ลิสต์</button>
        </div>
    </div>

    <h3 style="text-align: center; color: var(--text-sub);">📚 เพลย์ลิสต์ของฉัน</h3>
    <div id="playlistContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjxB3WDZ7Q4EpZXskv93NP1GBAy3SCzLU",
        authDomain: "read-words-and-translate.firebaseapp.com",
        databaseURL: "https://read-words-and-translate-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "read-words-and-translate"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentLang = 'zh';

    // OCR Logic
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('imagePreview').src = URL.createObjectURL(file);
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('status').innerText = "🔍 กำลังสแกน...";
        
        const worker = await Tesseract.createWorker(currentLang === 'zh' ? 'chi_sim' : 'eng');
        const ret = await worker.recognize(file);
        document.getElementById('sourceText').value = ret.data.text.trim();
        await worker.terminate();
        document.getElementById('status').innerText = "✅ สแกนสำเร็จ";
    };

    // Tabs & Playlist
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentLang = tab.dataset.lang;
            document.body.className = currentLang === 'zh' ? 'active-cn' : 'active-en';
        };
    });

    onValue(ref(db, 'playlists'), (snapshot) => {
        const lists = snapshot.val() || { "General": true };
        const select = document.getElementById('playlistSelect');
        select.innerHTML = "";
        Object.keys(lists).forEach(name => select.add(new Option(name, name)));
    });

    window.addNewPlaylist = () => {
        const name = prompt("ชื่อเพลย์ลิสต์:");
        if (name) set(ref(db, `playlists/${name}`), true);
    };

    // AI & Actions
    document.getElementById('refineBtn').onclick = async () => {
        const text = document.getElementById('sourceText').value;
        if (!text) return;
        document.getElementById('status').innerText = "🤖 AI กำลังทำงาน...";
        const API_KEY = "AIzaSyBNRCkZfR7H2Xkm1aIrqnS-OzFMj8Adh-I";
        const prompt = `Translate this ${currentLang === 'zh' ? 'Chinese' : 'English'} to elegant Thai and list key vocabulary: "${text}"`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            document.getElementById('aiResult').innerText = data.candidates[0].content.parts[0].text;
            document.getElementById('actionBtns').style.display = 'block';
            document.getElementById('status').innerText = "✨ แปลเสร็จแล้ว";
        } catch (e) { alert("Error: " + e.message); }
    };

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(`ต้นฉบับ: ${document.getElementById('sourceText').value}\n\nผลลัพธ์:\n${document.getElementById('aiResult').innerText}`);
        alert("คัดลอกแล้ว!");
    };

    document.getElementById('saveBtn').onclick = () => {
        const pName = document.getElementById('playlistSelect').value;
        push(ref(db, `data_by_playlist/${pName}`), {
            lang: currentLang,
            original: document.getElementById('sourceText').value,
            result: document.getElementById('aiResult').innerText,
            date: new Date().toLocaleString()
        });
        alert("บันทึกลง " + pName);
    };

    onValue(ref(db, 'data_by_playlist'), (snapshot) => {
        const container = document.getElementById('playlistContainer');
        container.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(pName => {
                const folder = document.createElement('div');
                folder.className = 'folder-card';
                folder.innerHTML = `<div class="folder-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>📂 ${pName}</span><span>▼</span></div>
                <div class="folder-content">${Object.keys(data[pName]).reverse().map(id => `
                    <div class="vocab-item">
                        <strong>${data[pName][id].original}</strong><br>
                        <small style="white-space:pre-wrap;">${data[pName][id].result}</small><br>
                        <button onclick="window.delVocab('${pName}','${id}')" style="color:red;border:none;background:none;font-size:10px;cursor:pointer;">ลบ</button>
                    </div>`).join('')}</div>`;
                container.appendChild(folder);
            });
        }
    });

    window.delVocab = (pName, id) => { if(confirm('ลบ?')) remove(ref(db, `data_by_playlist/${pName}/${id}`)); };
</script>
</body>
</html>
